name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Lint & Syntax Check
  # ──────────────────────────────────────────
  lint:
    name: 🔍 Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          pip install flake8 pyflakes

      - name: Check Python syntax (all files)
        run: |
          echo "🔎 Checking syntax..."
          for f in *.py; do
            python -c "import ast; ast.parse(open('$f').read())" && echo "✅ $f" || (echo "❌ $f has syntax errors" && exit 1)
          done

      - name: Flake8 lint (errors only)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,__pycache__,venv,.venv

  # ──────────────────────────────────────────
  # JOB 2: Unit Tests
  # ──────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Create dummy .env for tests
        run: |
          echo "USERNAME=test@example.com" > .env
          echo "PASSWORD=testpassword" >> .env
          echo "GITHUB_URL=https://github.com/test" >> .env

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "⚠️ No tests found — skipping."

  # ──────────────────────────────────────────
  # JOB 3: Docker Build Check
  # ──────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          echo "USERNAME=test@example.com" > .env
          echo "PASSWORD=testpassword" >> .env
          echo "GITHUB_URL=https://github.com/test" >> .env

      - name: Build Docker image
        run: |
          docker build -t birthday-agent:test .

      - name: Verify image built successfully
        run: |
          docker image inspect birthday-agent:test
          echo "✅ Docker image built successfully"

  # ──────────────────────────────────────────
  # JOB 4: Deploy (only on push to main)
  # ──────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/birthday-agent:latest
            ${{ secrets.DOCKER_USERNAME }}/birthday-agent:${{ github.sha }}

      - name: Deploy success notification
        run: |
          echo "🎉 Deployed birthday-agent:latest"
          echo "   Commit : ${{ github.sha }}"
          echo "   Branch : ${{ github.ref_name }}"
          echo "   Actor  : ${{ github.actor }}"
